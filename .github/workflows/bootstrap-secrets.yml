name: Bootstrap release secrets

# One-time helper: stores Tauri signing secrets on this repo using an admin PAT.
# Run manually from Actions, then delete this workflow or leave it disabled.
on:
  workflow_dispatch:
    inputs:
      admin_pat:
        description: 'GitHub PAT with repo Contents admin (classic: repo scope)'
        required: true
      signing_key:
        description: 'Full Tauri private key file contents'
        required: true
      signing_password:
        description: 'Tauri private key password (leave blank if none)'
        required: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Store Tauri signing secrets
        env:
          GH_TOKEN: ${{ inputs.admin_pat }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          printf '%s' "${{ inputs.signing_key }}" | gh secret set TAURI_SIGNING_PRIVATE_KEY --repo "$REPO"
          printf '%s' "${{ inputs.signing_password }}" | gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD --repo "$REPO"
          echo "Secrets configured on $REPO"
          gh secret list --repo "$REPO"
