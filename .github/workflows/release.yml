name: Release

on:
  push:
    # app releases only; plugin tags (vision-v*, copyright-v*) must not match
    tags: ['v[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
      signing_key:
        description: 'Optional Tauri signing private key (use until repo secrets are configured)'
        required: false
      signing_password:
        description: 'Optional Tauri signing private key password'
        required: false
  repository_dispatch:
    types: [release]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-intel
          - platform: ubuntu-22.04
            args: ''
            label: linux
          - platform: windows-latest
            args: ''
            label: windows
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag || github.event.client_payload.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || 'master' }}
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Resolve signing credentials
        id: signing
        env:
          DISPATCH_KEY: ${{ github.event.client_payload.signing_key }}
          DISPATCH_PASSWORD: ${{ github.event.client_payload.signing_password }}
          INPUT_KEY: ${{ inputs.signing_key }}
          INPUT_PASSWORD: ${{ inputs.signing_password }}
          REPO_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          REPO_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          valid_key() {
            local candidate="$1"
            [ -z "$candidate" ] && return 1
            decoded=$(printf '%s' "$candidate" | base64 -d 2>/dev/null || true)
            printf '%s' "$decoded" | grep -q 'untrusted comment:'
          }
          pick_first_valid_key() {
            for candidate in "$DISPATCH_KEY" "$INPUT_KEY" "$REPO_KEY"; do
              if valid_key "$candidate"; then
                printf '%s' "$candidate"
                return 0
              fi
            done
            return 1
          }
          if key=$(pick_first_valid_key); then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "TAURI_SIGNING_PRIVATE_KEY=$key" >> "$GITHUB_ENV"
            for candidate in "$DISPATCH_PASSWORD" "$INPUT_PASSWORD" "$REPO_PASSWORD"; do
              if [ -n "${candidate:-}" ]; then
                echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$candidate" >> "$GITHUB_ENV"
                break
              fi
            done
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No valid Tauri signing key found; updater artifacts will be skipped."
          fi

      - name: Disable updater artifacts when signing unavailable
        if: steps.signing.outputs.enabled != 'true'
        working-directory: app
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.bundle = c.bundle || {};
            c.bundle.createUpdaterArtifacts = false;
            fs.writeFileSync(p, JSON.stringify(c, null, '\t') + '\n');
            console.log('createUpdaterArtifacts=false (unsigned build)');
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            app/src-tauri/target/**/release/bundle/nsis/*.exe
            app/src-tauri/target/**/release/bundle/nsis/*.exe.sig
            app/src-tauri/target/**/release/bundle/msi/*.msi
            app/src-tauri/target/**/release/bundle/msi/*.msi.sig
            app/src-tauri/target/**/release/bundle/dmg/*.dmg
            app/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            app/src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
            app/src-tauri/target/**/release/bundle/appimage/*.AppImage
            app/src-tauri/target/**/release/bundle/appimage/*.AppImage.sig
            app/src-tauri/target/**/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag || github.event.client_payload.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([[:space:]]|$)" { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if ! grep -q '[^[:space:]]' notes.md; then
            echo "::error::No CHANGELOG.md section found for $TAG -- add a '## $TAG' section before tagging."
            exit 1
          fi
          echo "Release notes for $TAG:"
          cat notes.md

      - name: Normalize filenames (spaces to dots, matching GitHub asset naming)
        run: |
          find artifacts -type f -name '* *' | while IFS= read -r f; do
            mv "$f" "$(echo "$f" | tr ' ' '.')"
          done

      - name: Give macOS updater bundles arch-specific names
        # Both macOS .app.tar.gz bundles share the basename "Map.Making.App.app.tar.gz",
        # which collides on upload (422) and makes latest.json point both arches at one URL.
        run: |
          for f in $(find artifacts -path '*aarch64-apple-darwin*' -name '*.app.tar.gz'); do
            mv "$f" "$(dirname "$f")/Map.Making.App_aarch64.app.tar.gz"
          done
          for f in $(find artifacts -path '*x86_64-apple-darwin*' -name '*.app.tar.gz'); do
            mv "$f" "$(dirname "$f")/Map.Making.App_x64.app.tar.gz"
          done

      - name: Build latest.json for updater
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION="${TAG#v}"
          REPO="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          WIN_SIG=$(cat "$(find artifacts -path '*/nsis/*' -name '*.exe.sig' | head -1)" 2>/dev/null || echo "")
          MAC_ARM_SIG=$(cat "$(find artifacts -path '*aarch64*' -name '*.app.tar.gz.sig' | head -1)" 2>/dev/null || echo "")
          MAC_INTEL_SIG=$(cat "$(find artifacts -path '*x86_64*' -name '*.app.tar.gz.sig' | head -1)" 2>/dev/null || echo "")
          LINUX_SIG=$(cat "$(find artifacts -name '*.AppImage.sig' | head -1)" 2>/dev/null || echo "")

          WIN_FILE=$(basename "$(find artifacts -path '*/nsis/*' -name '*.exe' ! -name '*.sig' | head -1)")
          MAC_ARM_FILE=$(basename "$(find artifacts -path '*aarch64*' -name '*.app.tar.gz' ! -name '*.sig' | head -1)")
          MAC_INTEL_FILE=$(basename "$(find artifacts -path '*x86_64*' -name '*.app.tar.gz' ! -name '*.sig' | head -1)")
          LINUX_FILE=$(basename "$(find artifacts -name '*.AppImage' ! -name '*.sig' | head -1)")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes on GitHub",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": { "url": "${REPO}/${WIN_FILE}", "signature": "${WIN_SIG}" },
              "darwin-aarch64": { "url": "${REPO}/${MAC_ARM_FILE}", "signature": "${MAC_ARM_SIG}" },
              "darwin-x86_64": { "url": "${REPO}/${MAC_INTEL_FILE}", "signature": "${MAC_INTEL_SIG}" },
              "linux-x86_64": { "url": "${REPO}/${LINUX_FILE}", "signature": "${LINUX_SIG}" }
            }
          }
          EOF

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          TAG: ${{ env.RELEASE_TAG }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          mapfile -t files < <(find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.app.tar.gz" \) ! -name "*.sig")
          files+=(latest.json)
          printf 'Uploading to %s: %s\n' "$RELEASE_REPO" "${files[@]}"
          gh release delete "$TAG" --repo "$RELEASE_REPO" --yes 2>/dev/null || true
          gh release create "$TAG" --repo "$RELEASE_REPO" --title "$TAG" --draft --notes-file notes.md "${files[@]}"
