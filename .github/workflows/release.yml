name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-intel
          - platform: ubuntu-22.04
            args: ''
            label: linux
          - platform: windows-latest
            args: ''
            label: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            app/src-tauri/target/**/release/bundle/nsis/*.exe
            app/src-tauri/target/**/release/bundle/nsis/*.sig
            app/src-tauri/target/**/release/bundle/msi/*.msi
            app/src-tauri/target/**/release/bundle/msi/*.sig
            app/src-tauri/target/**/release/bundle/dmg/*.dmg
            app/src-tauri/target/**/release/bundle/dmg/*.sig
            app/src-tauri/target/**/release/bundle/appimage/*.AppImage
            app/src-tauri/target/**/release/bundle/appimage/*.sig
            app/src-tauri/target/**/release/bundle/deb/*.deb
            app/src-tauri/target/**/release/bundle/deb/*.sig
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build latest.json for updater
        env:
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          REPO="https://github.com/ccmdi/mma/releases/download/${TAG}"

          # Read signatures
          WIN_SIG=$(cat "$(find artifacts -name '*.nsis.exe.sig' | head -1)" 2>/dev/null || echo "")
          MAC_ARM_SIG=$(cat "$(find artifacts -path '*aarch64*' -name '*.dmg.sig' | head -1)" 2>/dev/null || echo "")
          MAC_INTEL_SIG=$(cat "$(find artifacts -path '*x86_64*' -name '*.dmg.sig' | head -1)" 2>/dev/null || echo "")
          LINUX_SIG=$(cat "$(find artifacts -name '*.AppImage.sig' | head -1)" 2>/dev/null || echo "")

          # Get filenames
          WIN_FILE=$(basename "$(find artifacts -name '*.nsis.exe' ! -name '*.sig' | head -1)")
          MAC_ARM_FILE=$(basename "$(find artifacts -path '*aarch64*' -name '*.dmg' ! -name '*.sig' | head -1)")
          MAC_INTEL_FILE=$(basename "$(find artifacts -path '*x86_64*' -name '*.dmg' ! -name '*.sig' | head -1)")
          LINUX_FILE=$(basename "$(find artifacts -name '*.AppImage' ! -name '*.sig' | head -1)")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes on GitHub",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": { "url": "${REPO}/${WIN_FILE}", "signature": "${WIN_SIG}" },
              "darwin-aarch64": { "url": "${REPO}/${MAC_ARM_FILE}", "signature": "${MAC_ARM_SIG}" },
              "darwin-x86_64": { "url": "${REPO}/${MAC_INTEL_FILE}", "signature": "${MAC_INTEL_SIG}" },
              "linux-x86_64": { "url": "${REPO}/${LINUX_FILE}", "signature": "${LINUX_SIG}" }
            }
          }
          EOF

      - name: Create draft release on ccmdi/mma
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: |
          mapfile -t files < <(find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \))
          files+=(latest.json)
          printf 'Uploading: %s\n' "${files[@]}"
          gh release create "$TAG" --repo ccmdi/mma --title "$TAG" --draft "${files[@]}"
