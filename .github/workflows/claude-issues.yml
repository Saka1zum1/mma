name: Claude

# Pinged by an @claude mention on an issue/PR. The Claude GitHub App path only runs for
# write-access users, so the ping is always the maintainer directing it -- no allowlist needed.
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Checkout private reference
        uses: actions/checkout@v4
        with:
          repository: ccmdi/mma-reference
          token: ${{ secrets.DOCS_TOKEN }}
          path: docs
      - name: Place reference at local paths
        run: |
          cp docs/CLAUDE.md ./CLAUDE.md
          cp -r docs/mma-source ./mma-source

      - name: Build
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: '{"attribution":{"commit":"","pr":""}}'
          claude_args: |
            --model claude-opus-4-6
            --dangerously-skip-permissions
          prompt: |
            You have been pinged with @claude on an issue (or PR) in the public repo
            ccmdi/mma by a maintainer. Project guidance and private reference docs are at
            ./CLAUDE.md and ./docs -- read ./CLAUDE.md first, then consult ./docs as needed.
            These are reference-only: never quote, paste, or reproduce their contents into
            any PR, comment, branch, or commit message.

            Do what the comment asks. Implement it on a branch and open a DRAFT pull request
            with a brief description of the change and "Closes #<issue number>" so it links
            and auto-closes on merge. Only if the request genuinely cannot be done as a code
            change, leave one short comment explaining why. Keep everything concise.
