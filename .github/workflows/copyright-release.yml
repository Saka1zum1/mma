name: Copyright Plugin Release

on:
  push:
    tags: ['copyright-v*']
  workflow_dispatch:

jobs:
  # Build sidecar binary for each platform (GPU backend where available)
  build-sidecar:
    uses: ./.github/workflows/build-sidecar.yml
    with:
      crate-path: plugins/copyright/sidecar
      binary-name: mma-copyright
      features-windows-x64: directml
      features-macos-arm64: coreml

  # Bundle everything into release archives
  package:
    needs: [build-sidecar]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: windows-x64
            suffix: .exe
          - label: macos-arm64
            suffix: ''
          - label: linux-x64
            suffix: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mma-copyright-${{ matrix.label }}
          path: bundle/

      - name: Add trained CNN model to bundle
        run: |
          mkdir -p bundle/models
          cp plugins/copyright/sidecar/models/wm_cls.onnx \
             plugins/copyright/sidecar/models/wm_template.bin bundle/models/

      - name: Create archive
        run: |
          cd bundle
          chmod +x mma-copyright${{ matrix.suffix }} 2>/dev/null || true
          zip -r ../mma-copyright-${{ matrix.label }}.zip .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: mma-copyright-bundle-${{ matrix.label }}
          path: mma-copyright-${{ matrix.label }}.zip

  # Single fan-in job attaches all archives: parallel per-platform attaches race
  # to create the release for the tag (duplicate drafts, stranded assets).
  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mma-copyright-bundle-*
          merge-multiple: true

      - name: Compute SHA-256 digests
        id: sha
        run: |
          for f in mma-copyright-*.zip; do
            platform="${f#mma-copyright-}"
            platform="${platform%.zip}"
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "sha256-${platform}=${hash}" >> "$GITHUB_OUTPUT"
            echo "${hash}  ${f}" >> checksums.txt
          done
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          # never steal the Latest badge from app releases (updater reads releases/latest)
          make_latest: false
          files: |
            mma-copyright-*.zip
            checksums.txt
          body: |
            **SHA-256 digests** (copy into manifest.json / registry.json):
            ```
            "sha256-windows-x64": "${{ steps.sha.outputs.sha256-windows-x64 }}",
            "sha256-macos-arm64": "${{ steps.sha.outputs.sha256-macos-arm64 }}",
            "sha256-linux-x64": "${{ steps.sha.outputs.sha256-linux-x64 }}"
            ```
